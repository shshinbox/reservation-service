spring.application.name=reservation-service

spring.profiles.default=local

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health

reservation.kafka.topics.seat-held=seat-held-events
reservation.kafka.consumer.group-id=reservation-service
reservation.kafka.consumer.retry-interval-ms=1000
reservation.kafka.consumer.max-retry-attempts=3

reservation.expiration-scheduler.fixed-delay-ms=30000
