spring.application.name=reservation-service

spring.profiles.default=local

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=reservation

spring.flyway.enabled=true
spring.flyway.schemas=reservation
spring.flyway.create-schemas=true

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health

reservation.kafka.topics.seat-hold=seat-hold-events
reservation.kafka.consumer.group-id=reservation-service
reservation.kafka.consumer.retry-interval-ms=1000
reservation.kafka.consumer.max-retry-attempts=3

reservation.expiration-scheduler.enabled=${RESERVATION_EXPIRATION_SCHEDULER_ENABLED:false}
reservation.expiration-scheduler.fixed-delay-ms=${RESERVATION_EXPIRATION_SCHEDULER_FIXED_DELAY_MS:30000}

reservation.payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:local-payment-webhook-secret}
