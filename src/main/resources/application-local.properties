spring.datasource.url=${LOCAL_DB_URL:jdbc:postgresql://localhost:5432/reservation}
spring.datasource.username=${LOCAL_DB_USERNAME:reservation}
spring.datasource.password=${LOCAL_DB_PASSWORD:reservation}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

spring.kafka.bootstrap-servers=${LOCAL_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
